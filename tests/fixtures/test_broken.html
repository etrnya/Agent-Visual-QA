<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: sans-serif; background: #fafafa; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { padding: 20px; background: white; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; position: relative; width: 300px; height: 150px; }
        h1 { color: #f5f5f5; margin-bottom: 10px; } /* Low contrast issue: white text on white bg */
        p { color: #666; position: absolute; top: 15px; left: 20px; font-size: 24px; font-weight: bold; } /* Overlap issue: overlaps header */
    </style>
</head>
<body>
    <div class="card">
        <h1>Hello World</h1>
        <p>This is a broken layout overlap test page.</p>
    </div>
</body>
</html>
